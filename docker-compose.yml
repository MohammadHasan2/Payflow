version: "3.9"

services:

  backend:
    build: .
    container_name: payflow_backend
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: payflow_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend